version: '3.9'

services:
  api:
    build: .
    container_name: foodexpress-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - foodexpress-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: foodexpress
      POSTGRES_USER: feuser
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodexpress-net

volumes:
  postgres_data:

networks:
  foodexpress-net:
    driver: bridge