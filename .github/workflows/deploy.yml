name: FoodExpress CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/foodexpress-api
  IMAGE_TAG:    ${{ github.sha }}

jobs:

  # ── Job 1: Run Tests ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: 'npm' }
      - run: npm ci
      - run: npm test

  # ── Job 2: Build & Push Docker Image ─────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 3: Terraform Provision ───────────────────────────────────
  terraform:
    name: Terraform Provision
    runs-on: ubuntu-latest
    needs: build-and-push
    defaults:
      run:
        working-directory: ./terraform
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ip }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.6.0' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1
      - run: terraform init
      - run: |
          terraform apply -auto-approve \
            -var="ssh_public_key=${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}"
      - id: tf_output
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  # ── Job 4: Deploy Container ───────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ needs.terraform.outputs.ec2_ip }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          timeout:  120s
          script: |
            docker pull ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
            docker stop foodexpress-api 2>/dev/null || true
            docker rm   foodexpress-api 2>/dev/null || true
            docker run -d \
              --name foodexpress-api \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
            docker system prune -f

  # ── Job 5: Health Check ───────────────────────────────────────────
  healthcheck:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [terraform, deploy]
    steps:
      - run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 10 \
            http://${{ needs.terraform.outputs.ec2_ip }}:3000/health
